<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Good Night Sir 🌙</title>
<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
  }
  body{
    min-height:100vh;
    background: radial-gradient(circle at top, #1b2b4f, #020617);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    position:relative;
  }

  /* Stars */
  .stars{
    position:absolute;
    width:100%;
    height:100%;
    z-index:0;
    overflow:hidden;
  }
  .star{
    position:absolute;
    border-radius:50%;
    opacity:0.7;
    box-shadow: 0 0 6px rgba(255,255,255,0.6), 0 0 12px rgba(255,255,255,0.4);
    animation: twinkle 3s infinite ease-in-out, moveStars linear infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
  }
  @keyframes moveStars{
    0%{transform: translate(0,0);}
    100%{transform: translate(-200px, 200px);}
  }

  /* Center */
  .center-text{
    z-index:1;
    text-align:center;
  }

  /* Moon Emoji */
  .moon-emoji{
    font-size:110px;
    line-height:1;
    margin:0 auto 12px;
    cursor:pointer;
    filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));
    transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1), filter 0.7s ease;
  }
  .moon-emoji.active{
    transform: translateY(-14px) scale(1.1);
    filter: drop-shadow(0 0 40px rgba(180,220,255,1));
  }

  /* Text */
  h1{
    font-size:38px;
    letter-spacing:2px;
    cursor:pointer;
    transition: transform 1.1s cubic-bezier(0.19, 1, 0.22, 1), text-shadow 1.1s ease;
    text-shadow:
      0 0 6px rgba(255,255,255,0.35),
      0 0 14px rgba(173,216,230,0.45);
  }
  h1.active{
    transform: translateY(-10px) scale(1.045);
    text-shadow:
      0 0 10px rgba(255,255,255,0.9),
      0 0 24px rgba(147,197,253,0.9),
      0 0 45px rgba(147,197,253,0.9);
  }

  @media(max-width:480px){
    h1{font-size:30px;}
    .moon-emoji{font-size:85px;}
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="center-text">
  <div class="moon-emoji" id="moon">🌙</div>
  <h1 id="text">Good Night Sir 🌙</h1>
</div>

<audio id="spaceSound" loop>
  <source src="Sound_1.mp3" type="audio/mpeg">
</audio>

<script>
const starsContainer = document.getElementById('stars');
const starCount = 150; // original stars
const extraStars = 50;  // extra stars
const totalStars = starCount + extraStars;

// Full realistic color palette
const colors = [
  '#ffffff','#99ccff','#ff99cc','#ff9933','#ccffff','#ff66ff','#66ffff','#cc99ff','#ffb3b3','#b3ffcc'
];

// Array to store star positions and sizes
let starData = [];

// Function to generate star data only once
for(let i=0; i<totalStars; i++){
  starData.push({
    top: Math.random()*100 + '%',
    left: Math.random()*100 + '%',
    size: Math.random()*4 + 1, // 1px to 5px
    color: colors[Math.floor(Math.random()*colors.length)],
    duration: Math.random()*60 + 60, // 60s to 120s
    delay: Math.random()*60
  });
}

// Function to create stars from starData
function createStar(star){
  const s = document.createElement('span');
  s.classList.add('star');
  s.style.width = star.size + 'px';
  s.style.height = star.size + 'px';
  s.style.top = star.top;
  s.style.left = star.left;
  s.style.backgroundColor = star.color;
  s.style.animationDuration = `${star.duration}s, 3s`;
  s.style.animationDelay = `${star.delay}s, ${Math.random()*3}s`;
  starsContainer.appendChild(s);
}

// Create all stars
starData.forEach(s => createStar(s));

// Moon & Text effect logic
const moon = document.getElementById('moon');
const text = document.getElementById('text');
const sound = document.getElementById('spaceSound');

let soundStarted = false;
let moonActive = false;
let textActive = false;

// Moon click
moon.addEventListener('click', (e)=>{
  e.stopPropagation();
  if(!soundStarted){
    sound.volume = 0.7;
    sound.play();
    soundStarted = true;
  }
  moon.classList.add('active');
  moonActive = true;

  // Text normal
  text.classList.remove('active');
  textActive = false;
});

// Text click
text.addEventListener('click', (e)=>{
  e.stopPropagation();
  if(!soundStarted){
    sound.volume = 0.7;
    sound.play();
    soundStarted = true;
  }
  text.classList.add('active');
  textActive = true;

  // Moon normal
  moon.classList.remove('active');
  moonActive = false;
});

// Background click → both normal
document.body.addEventListener('click', ()=>{
  moon.classList.remove('active');
  moonActive = false;
  text.classList.remove('active');
  textActive = false;
});
</script>

</body>
</html>
